<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: red; /* Red background to test visibility */
            z-index: 0;
        }
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Visibility Test</h1>
        <p>If you see a red background, the container is visible.</p>
        <p>If you see nothing, there's a CSS issue.</p>
    </div>
    <div id="map"></div>
    <script>
        console.log('Page loaded');
        console.log('Map container:', document.getElementById('map'));
        console.log('Map container dimensions:', {
            width: document.getElementById('map').offsetWidth,
            height: document.getElementById('map').offsetHeight
        });
    </script>
</body>
</html>
