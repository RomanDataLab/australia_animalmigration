# CircuitScape Configuration Template
# This is a template configuration file for CircuitScape analysis
# Customize this for each species/analysis

[Options for advanced mode]
# Input files
habitat_file_is_resistances = False
habitat_file = data/output/australia_resistance.tif
point_file = data/output/species_current.tif

# Output files
output_file = data/output/species_connectivity.asc
set_null_currents_to_nodata = 1
set_null_voltages_to_nodata = 1

# Output options
write_cur_maps = 1
write_volt_maps = 1
write_cum_cur_map_only = 1
log_transform_maps = 0

# Analysis mode
scenario = pairwise

# Performance
low_memory_mode = False

# Note: For pairwise mode with sources and sinks:
# You may need separate source and sink files
# source_file = data/output/species_current.tif
# sink_file = data/output/species_future.tif


